name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: Conduit.exe
            artifact_path: dist/Conduit.exe
          - os: ubuntu-latest
            artifact_name: Conduit-linux
            artifact_path: dist/Conduit

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libgl1 libegl1 libglib2.0-0

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pyinstaller

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name "Conduit" `
            --add-data "resources\templates;resources\templates" `
            --add-data "src\conduit\ui\icons;conduit\ui\icons" `
            --add-data "src\conduit\ui\stylesheet.qss;conduit\ui" `
            src\conduit\__main__.py

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: |
          pyinstaller \
            --onefile \
            --windowed \
            --name "Conduit" \
            --add-data "resources/templates:resources/templates" \
            --add-data "src/conduit/ui/icons:conduit/ui/icons" \
            --add-data "src/conduit/ui/stylesheet.qss:conduit/ui" \
            src/conduit/__main__.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
